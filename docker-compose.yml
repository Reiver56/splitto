services:
  db:
    image: postgres:16-alpine
    container_name: splitto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-splitto}
      POSTGRES_USER: ${DB_USER:-splitto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-splitto}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - splitto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-splitto} -d ${DB_NAME:-splitto}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  splitto_pgdata:
